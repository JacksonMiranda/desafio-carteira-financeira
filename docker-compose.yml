services:
  postgres:
    image: postgres:16
    container_name: carteira-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-carteira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carteira}
      POSTGRES_DB: ${POSTGRES_DB:-carteira}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-carteira} -d $${POSTGRES_DB:-carteira}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: ./carteira-api
    container_name: carteira-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-carteira}:${POSTGRES_PASSWORD:-carteira}@postgres:5432/${POSTGRES_DB:-carteira}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build: ./carteira-web
    container_name: carteira-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      # No nome de serviço do compose, a API é alcançada por http://api:3000.
      API_URL: http://api:3000
      PORT: 3000
    ports:
      - "3001:3000"

volumes:
  postgres_data:
